<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Manrope:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Manrope', sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#3A3A3A;
background:linear-gradient(135deg, #f8f3ec 0%, #efe6d8 50%, #e8dccb 100%);
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5efe6;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1.2s ease;
}

.intro-content{
text-align:center;
opacity:0;
transform:translateY(20px);
animation:introFade 1.8s ease forwards;
}

.intro-content h2{
font-family:'Playfair Display',serif;
color:#C8A96A;
font-size:38px;
}

.enter-btn{
margin-top:20px;
padding:14px 28px;
border-radius:50px;
border:1px solid #C8A96A;
background:transparent;
color:#C8A96A;
cursor:pointer;
}

.enter-btn:hover{
background:#C8A96A;
color:white;
}

@keyframes introFade{
to{opacity:1; transform:translateY(0);}
}

#intro.hide{
opacity:0;
pointer-events:none;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.85);
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:24px;
}

/* PHOTO */

.photo-container{
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:20px;
}

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

h1{
font-family:'Playfair Display',serif;
color:#C8A96A;
text-align:center;
}

.date,.message{
text-align:center;
color:#6e6e6e;
}

/* INPUT */

input{
width:85%;
margin:auto;
display:block;
padding:14px;
border-radius:14px;
border:1px solid #e0d6c8;
background:#f7f3ed;
}

/* CARD */

.card{
margin-top:20px;
padding:20px;
border-radius:18px;
background:#fffdf9;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
opacity:0;
transform:translateY(20px);
transition:0.4s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.gold{
color:#C8A96A;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.name{
border-bottom:1px solid #eee;
}

/* PLAN */

#planContainer{
display:none;
margin-top:20px;
text-align:center;
position:relative;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

.highlight{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
pointer-events:none;
transform:translate(-50%, -50%);
box-shadow:
0 0 0 3px #C8A96A,
0 0 20px rgba(200,169,106,0.6),
0 0 40px rgba(200,169,106,0.3);
animation:luxPulse 2s ease-in-out infinite;
}

@keyframes luxPulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.15);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-content">
    <h2>Johann & Nuria</h2>
    <p>3 de abril de 2026</p>
    <button id="enterBtn" class="enter-btn">Entrar</button>
  </div>
</div>

<div class="container">

<div class="photo-container">
<img src="photo.jpg" class="photo">
</div>

<h1>Johann & Nuria</h1>
<div class="date">3 de abril de 2026</div>

<input id="search" placeholder="Digite o seu nome">

<div id="welcomeMessage" class="message">
Estamos felizes em recebê-lo
</div>

<div id="card" class="card"></div>

<!-- PLAN -->
<div id="planContainer">

<p style="color:#C8A96A;">📍 Encontre a sua mesa</p>

<div style="position:relative;">
<img src="plan.png" style="width:100%; border-radius:12px;">
</div>

</div>

</div>

<script>

const input = document.getElementById("search");
const card = document.getElementById("card");

input.addEventListener("input", () => {

card.classList.remove("show");

if(!value) return;

for(let table in tables){

let match = tables[table].find(n => n.toLowerCase().includes(value));

if(match){

let others = tables[table].filter(n => n !== match);

card.innerHTML = `
💌 Prazer em recebê-lo <span class="gold">${match}</span><br><br>
🍽️ Mesa <span class="gold">${table}</span>

<div class="grid">
${others.map(n=>`<div class="name">${n}</div>`).join("")}
</div>

}
}

});

/* HIGHLIGHT */

function highlightTableOnPlan(tableNumber){

let container = document.querySelector("#planContainer div");

let existing = document.querySelector(".highlight");
if(existing) existing.remove();

let positions = {
1:{x:10,y:10}, 2:{x:25,y:18}, 3:{x:70,y:18}, 4:{x:90,y:10},

21:{x:10,y:96}, 22:{x:25,y:100}, 23:{x:70,y:100}, 24:{x:90,y:96}

let highlight = document.createElement("div");
highlight.className = "highlight";

highlight.style.left = positions[tableNumber].x + "%";
highlight.style.top = positions[tableNumber].y + "%";

container.appendChild(highlight);
}

</script>

</body>
</html>
